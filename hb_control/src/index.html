<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>RoboManipal Multi-Bot Debugger</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <style>
        /* Set a dark theme for easier debugging */
        body {
            background-color: #1e1e1e;
            color: #fff;
            font-family: monospace;
            display: flex;
            margin: 0;
            padding: 20px;
        }

        /* Style the canvas to look like a screen */
        #arena {
            background-color: #000;
            border: 2px solid #444;
            margin-right: 20px;
        }

        /* Style the sidebar for text data */
        #sidebar {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Style individual data cards in the sidebar */
        .card {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #555;
        }

        /* Make status text pop */
        .status-text {
            color: #00ffcc;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <canvas id="arena" width="800" height="800"></canvas>

    <div id="sidebar">
        <div class="card">
            <h2>Connection Status</h2>
            <p id="ws_status" style="color: yellow;">Connecting to ROSBridge...</p>
        </div>
        <div class="card" id="bot_data">
            <h2>Bot Telemetry</h2>
            <div id="bot_list">Waiting for data...</div>
        </div>
        <div class="card" id="zone_data">
            <h2>Zone Locks</h2>
            <div id="lock_list">Waiting for data...</div>
        </div>
    </div>

    <script type="text/javascript">
        // Define physical size of the arena in mm to calculate scaling
        const ARENA_SIZE_MM = 2438.4;
        // Get the canvas DOM element
        const canvas = document.getElementById('arena');
        // Get the 2D rendering context for drawing shapes
        const ctx = canvas.getContext('2d');
        // Calculate the scale factor (pixels per mm)
        const scale = canvas.width / ARENA_SIZE_MM;

        // Global objects to hold the latest parsed JSON data
        let camData = { bots: {}, crates: {} };
        let ctrlData = { bots: {}, drop_zones: {} };

        // Initialize a new ROS connection pointing to the local rosbridge server
        var ros = new ROSLIB.Ros({
            url: 'ws://localhost:9090'
        });

        // Event listener for successful connection
        ros.on('connection', function () {
            // Update UI to show connected status
            document.getElementById('ws_status').innerText = "Connected to localhost:9090";
            document.getElementById('ws_status').style.color = "#00ff00";
        });

        // Event listener for connection errors
        ros.on('error', function (error) {
            // Update UI to show error status
            document.getElementById('ws_status').innerText = "Error connecting to websocket server.";
            document.getElementById('ws_status').style.color = "red";
        });

        // Event listener for connection close
        ros.on('close', function () {
            // Update UI to show closed status
            document.getElementById('ws_status').innerText = "Connection closed.";
            document.getElementById('ws_status').style.color = "red";
        });

        // Define the subscriber for the Perception node topic
        var cameraSub = new ROSLIB.Topic({
            ros: ros,
            name: '/camera_debug',
            messageType: 'std_msgs/String'
        });

        // Callback function triggered whenever a new perception message arrives
        cameraSub.subscribe(function (message) {
            // Try-catch block to prevent crashes from bad JSON
            try {
                // Parse the JSON string payload into a JavaScript object
                camData = JSON.parse(message.data);
            } catch (e) {
                // Ignore parse errors silently to keep loop running
            }
        });

        // Define the subscriber for the Controller node topic
        var ctrlSub = new ROSLIB.Topic({
            ros: ros,
            name: '/perception_debug',
            messageType: 'std_msgs/String'
        });

        // Callback function triggered whenever a new controller message arrives
        ctrlSub.subscribe(function (message) {
            // Try-catch block to prevent crashes from bad JSON
            try {
                // Parse the JSON string payload into a JavaScript object
                ctrlData = JSON.parse(message.data);
                // Trigger the function to update sidebar text
                updateSidebar();
            } catch (e) {
                // Ignore parse errors silently
            }
        });

        // Function to update the HTML text inside the sidebar
        function updateSidebar() {
            // Initialize empty string for bot HTML
            let botHtml = "";
            // Loop through each bot ID in the controller data
            for (let id in ctrlData.bots) {
                // Extract specific bot data
                let b = ctrlData.bots[id];
                // Append formatted HTML block with Bot ID, Status, and Velocity
                botHtml += `<p><b>Bot ${id}:</b> <span class="status-text">${b.status}</span> | Vel: ${b.velocity.toFixed(1)}</p>`;
                // Append current goal coordinates
                botHtml += `<p style="margin-top:-10px; font-size:0.9em; color:#aaa;">Goal: [${b.goal_x.toFixed(0)}, ${b.goal_y.toFixed(0)}] | Carrying: ${b.carrying_crate}</p>`;
            }
            // Inject the generated HTML into the DOM
            document.getElementById('bot_list').innerHTML = botHtml;

            // Initialize empty string for locks HTML
            let lockHtml = "";
            // Check if drop zones data exists
            if (ctrlData.drop_zones) {
                // Append Pickup Locks data as JSON string
                lockHtml += `<p>Pickup Locks: ${JSON.stringify(ctrlData.drop_zones.pickup_zone_locks)}</p>`;
                // Append Drop Locks data as JSON string
                lockHtml += `<p>Drop Locks: ${JSON.stringify(ctrlData.drop_zones.locks)}</p>`;
            }
            // Inject the generated locks HTML into the DOM
            document.getElementById('lock_list').innerHTML = lockHtml;
        }

        // Helper function to map physical mm to canvas pixels
        function toPx(mm) {
            // Multiply mm by scale factor to get pixels
            return mm * scale;
        }

        // The main render loop for drawing the 2D arena
        function drawLoop() {
            // Clear the entire canvas with black
            ctx.fillStyle = '#000000';
            // Draw a rectangle over the whole canvas area
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Set line color to faint white for the grid matrix
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            // Set line thickness to 1 pixel for thin matrix lines
            ctx.lineWidth = 1;

            // Loop through the entire physical arena size in steps of 50mm
            for (let i = 0; i <= ARENA_SIZE_MM; i += 20) {
                // Convert the physical 50mm step into canvas pixels
                let px = toPx(i);

                // Start a new path for a vertical grid line
                ctx.beginPath();
                // Move brush to the top edge of the canvas
                ctx.moveTo(px, 0);
                // Draw line down to the bottom edge of the canvas
                ctx.lineTo(px, canvas.height);
                // Apply the stroke to the canvas
                ctx.stroke();

                // Start a new path for a horizontal grid line
                ctx.beginPath();
                // Move brush to the left edge of the canvas
                ctx.moveTo(0, px);
                // Draw line across to the right edge of the canvas
                ctx.lineTo(canvas.width, px);
                // Apply the stroke to the canvas
                ctx.stroke();
            }

            // Draw a subtle grid background for visual reference
            ctx.strokeStyle = '#222';
            // Loop through canvas width in 50px increments
            for (let i = 0; i < canvas.width; i += 50) {
                // Start a new line path
                ctx.beginPath();
                // Move to top edge
                ctx.moveTo(i, 0);
                // Draw down to bottom edge
                ctx.lineTo(i, canvas.height);
                // Apply the stroke
                ctx.stroke();
                // Start a new line path for horizontal lines
                ctx.beginPath();
                // Move to left edge
                ctx.moveTo(0, i);
                // Draw across to right edge
                ctx.lineTo(canvas.width, i);
                // Apply the stroke
                ctx.stroke();
            }

            // Draw crates from Perception Data
            ctx.fillStyle = '#ffff00'; // Yellow crates
            // Loop over all crates in camera data
            for (let id in camData.crates) {
                // Extract specific crate object
                let c = camData.crates[id];
                // Convert real X to pixel X
                let px = toPx(c.x);
                // Convert real Y to pixel Y
                let py = toPx(c.y);

                // Draw a 10x10 square centered on the crate
                ctx.fillRect(px - 5, py - 5, 10, 10);
                // Set text color to white
                ctx.fillStyle = '#ffffff';
                // Label the crate with its ID
                ctx.fillText(`C${id}`, px + 8, py + 4);
                // Reset fill style to yellow for next crate
                ctx.fillStyle = '#ffff00';
            }

            // Draw bots from Controller Data (more reliable state than pure camera data)
            // Loop over all bots in controller data
            for (let id in ctrlData.bots) {
                // Extract specific bot object
                let b = ctrlData.bots[id];
                // Ensure pose array exists and has elements
                if (!b.pose || b.pose.length < 3) continue;

                // Extract X, Y, and W (Yaw) from pose array
                let bx = b.pose[0];
                let by = b.pose[1];
                let bw = b.pose[2]; // Degrees

                // Convert physical coords to pixel coords
                let px = toPx(bx);
                let py = toPx(by);

                // Check if bot is carrying a crate (Magnet active)
                if (b.magnet != 0) {
                    // Set color to bright magenta if carrying a crate
                    ctx.fillStyle = '#ff00ff';
                } else {
                    // Set color to cyan if empty-handed
                    ctx.fillStyle = '#00ffff';
                }

                // Start drawing the bot circle
                ctx.beginPath();
                // Draw an arc (circle) with 12px radius
                ctx.arc(px, py, 12, 0, 2 * Math.PI);
                // Fill the circle
                ctx.fill();

                // Draw a line to indicate orientation (Yaw)
                ctx.strokeStyle = '#ffffff';
                // Set line thickness to 2px
                ctx.lineWidth = 2;
                // Convert degrees to radians for math
                let rad = bw * (Math.PI / 180);
                // Start orientation line
                ctx.beginPath();
                // Move to center of bot
                ctx.moveTo(px, py);
                // Draw line pointing 20px in the direction of yaw
                ctx.lineTo(px + Math.cos(rad) * 20, py + Math.sin(rad) * 20);
                // Apply the stroke
                ctx.stroke();

                // Draw safety/avoidance radius if specified by controller
                if (b.radius) {
                    // Start path for safety circle
                    ctx.beginPath();
                    // Draw outline using the dynamic radius from python
                    ctx.arc(px, py, toPx(b.radius), 0, 2 * Math.PI);
                    // Set color to dim red for avoidance zone
                    ctx.strokeStyle = 'rgba(255, 0, 0, 0.3)';
                    // Apply stroke
                    ctx.stroke();
                }

                // Draw a line to the current Goal
                // Check if goal data exists
                if (b.goal && b.goal.length >= 2) {
                    // Start path for goal line
                    ctx.beginPath();
                    // Move to center of bot
                    ctx.moveTo(px, py);
                    // Draw line to target X/Y coordinates
                    ctx.lineTo(toPx(b.goal[0]), toPx(b.goal[1]));
                    // Set color to dim green for path
                    ctx.strokeStyle = 'rgba(0, 255, 0, 0.5)';
                    // Set thickness to 1px
                    ctx.lineWidth = 1;
                    // Apply stroke
                    ctx.stroke();

                    // Draw an 'X' at the goal destination
                    ctx.fillStyle = '#00ff00';
                    // Plot text exactly at goal location
                    ctx.fillText('X', toPx(b.goal[0]) - 3, toPx(b.goal[1]) + 3);
                }

                // Label the bot with its ID next to it
                ctx.fillStyle = '#ffffff';
                // Offset text slightly so it doesn't overlap bot graphic
                // Check if the bot has a valid path array from the controller
                if (b.path && b.path.length > 0) {
                    // Start a new line path for the A* route
                    ctx.beginPath();
                    // Move the brush to the robot's current pixel coordinates
                    ctx.moveTo(px, py);

                    // Loop through every physical waypoint in the path array
                    for (let i = 0; i < b.path.length; i++) {
                        // Convert waypoint X mm to pixels
                        let wayX = toPx(b.path[i][0]);
                        // Convert waypoint Y mm to pixels
                        let wayY = toPx(b.path[i][1]);
                        // Draw a line segment to this waypoint
                        ctx.lineTo(wayX, wayY);
                    }

                    // Set path color to cyan for visibility
                    ctx.strokeStyle = '#00ffcc';
                    // Set path thickness to 2 pixels
                    ctx.lineWidth = 2;
                    // Render the complete multi-segment line
                    ctx.stroke();
                }
                ctx.fillText(`B${id}`, px + 15, py - 15);

            
            }

            // Loop the render function matching monitor refresh rate (~60fps)
            requestAnimationFrame(drawLoop);
        }

        // Start the rendering loop for the first time
        drawLoop();
    </script>
</body>

</html>
